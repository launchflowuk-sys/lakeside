openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Lakeside & Purfleet Taxis API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Public lead/booking request operations
  - name: admin-auth
    description: Admin authentication
  - name: admin-leads
    description: Admin lead management
  - name: admin-stats
    description: Admin dashboard statistics
  - name: corporate-applications
    description: Public corporate account applications
  - name: admin-corporate
    description: Admin corporate application management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /leads:
    post:
      operationId: submitLead
      tags: [leads]
      summary: Submit a booking request / quote enquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/auth/login:
    post:
      operationId: adminLogin
      tags: [admin-auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/auth/logout:
    post:
      operationId: adminLogout
      tags: [admin-auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/auth/me:
    get:
      operationId: getAdminMe
      tags: [admin-auth]
      summary: Get current admin user
      responses:
        "200":
          description: Current admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin-stats]
      summary: Dashboard statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/leads:
    get:
      operationId: listAdminLeads
      tags: [admin-leads]
      summary: List all leads with optional filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: Filter by lead status
        - name: page
          in: query
          schema:
            type: integer
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
          description: Items per page
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadListResponse"

  /admin/leads/{id}:
    get:
      operationId: getAdminLead
      tags: [admin-leads]
      summary: Get a single lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdminLead
      tags: [admin-leads]
      summary: Update a lead (status, notes, quoted price, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdate"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/leads/{id}/reply:
    post:
      operationId: replyToLead
      tags: [admin-leads]
      summary: Send an email reply to the customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadReplyInput"
      responses:
        "200":
          description: Reply sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadReply"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/leads/{id}/replies:
    get:
      operationId: getLeadReplies
      tags: [admin-leads]
      summary: Get reply log for a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reply log
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadReply"

  /admin/leads/{id}/quote:
    post:
      operationId: createQuote
      tags: [admin-leads]
      summary: Create a customer quote for a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteInput"
      responses:
        "201":
          description: Quote created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getLeadQuote
      tags: [admin-leads]
      summary: Get the quote for a lead (if one exists)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          description: No quote found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/leads/{id}/quote/mark-paid:
    patch:
      operationId: markQuotePaid
      tags: [admin-leads]
      summary: Mark an accepted quote's payment as received (cash / manually confirmed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote marked paid, lead moved to booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          description: Quote is not in accepted status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No quote found for this lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/leads/{id}/quote/{quoteId}/payment-link:
    post:
      operationId: createQuotePaymentLink
      tags: [admin-leads]
      summary: Create a Square Payment Link for this quote's price
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: quoteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment link created and saved on the quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          description: Quote is in a state that can't accept a payment link, or price couldn't be parsed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Quote not found for this lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Square is not configured or the payment link could not be created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quotes/{ref}:
    get:
      operationId: getPublicQuote
      tags: [quotes]
      summary: Get a quote by reference (public)
      parameters:
        - name: ref
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          description: Quote not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quotes/{ref}/accept:
    post:
      operationId: acceptQuote
      tags: [quotes]
      summary: Customer accepts a quote
      parameters:
        - name: ref
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          description: Quote already accepted or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Quote not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /corporate-applications:
    post:
      operationId: submitCorporateApplication
      tags: [corporate-applications]
      summary: Submit a corporate account application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorporateApplicationInput"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorporateApplication"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/corporate-applications:
    get:
      operationId: listAdminCorporateApplications
      tags: [admin-corporate]
      summary: List corporate account applications
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [new, reviewing, approved, rejected, on_hold]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorporateApplicationListResponse"

  /admin/corporate-applications/{id}:
    get:
      operationId: getAdminCorporateApplication
      tags: [admin-corporate]
      summary: Get a corporate application by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Corporate application detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorporateApplication"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdminCorporateApplication
      tags: [admin-corporate]
      summary: Update status / notes on a corporate application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorporateApplicationUpdate"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorporateApplication"
    delete:
      operationId: deleteAdminCorporateApplication
      tags: [admin-corporate]
      summary: Delete a corporate application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    LeadInput:
      type: object
      required:
        - journeyType
        - pickupLocation
        - destination
        - journeyDate
        - journeyTime
        - passengers
        - fullName
        - mobile
        - email
        - preferredContactMethod
      properties:
        journeyType:
          type: string
          enum: [local, airport, school_run, corporate, cruise_terminal, other]
        pickupLocation:
          type: string
        destination:
          type: string
        viaStops:
          type: ["string", "null"]
        journeyDate:
          type: string
        journeyTime:
          type: string
        returnRequired:
          type: boolean
        returnDate:
          type: ["string", "null"]
        returnTime:
          type: ["string", "null"]
        passengers:
          type: integer
        luggage:
          type: ["string", "null"]
        childSeatsRequired:
          type: boolean
        accessibilityRequirements:
          type: ["string", "null"]
        additionalNotes:
          type: ["string", "null"]
        fullName:
          type: string
        mobile:
          type: string
        email:
          type: string
        preferredContactMethod:
          type: string
          enum: [phone, whatsapp, email]

    Lead:
      type: object
      required:
        - id
        - createdAt
        - status
        - journeyType
        - pickupLocation
        - destination
        - journeyDate
        - journeyTime
        - passengers
        - fullName
        - mobile
        - email
        - preferredContactMethod
      properties:
        id:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        status:
          type: string
        journeyType:
          type: string
        pickupLocation:
          type: string
        destination:
          type: string
        viaStops:
          type: ["string", "null"]
        journeyDate:
          type: string
        journeyTime:
          type: string
        returnRequired:
          type: boolean
        returnDate:
          type: ["string", "null"]
        returnTime:
          type: ["string", "null"]
        passengers:
          type: integer
        luggage:
          type: ["string", "null"]
        childSeatsRequired:
          type: boolean
        accessibilityRequirements:
          type: ["string", "null"]
        additionalNotes:
          type: ["string", "null"]
        fullName:
          type: string
        mobile:
          type: string
        email:
          type: string
        preferredContactMethod:
          type: string
        quotedPrice:
          type: ["string", "null"]
        adminNotes:
          type: ["string", "null"]
        assignedDriver:
          type: ["string", "null"]
        bookingReference:
          type: ["string", "null"]

    LeadDetail:
      type: object
      required:
        - id
        - createdAt
        - status
        - journeyType
        - pickupLocation
        - destination
        - journeyDate
        - journeyTime
        - passengers
        - fullName
        - mobile
        - email
        - preferredContactMethod
      properties:
        id:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        status:
          type: string
        journeyType:
          type: string
        pickupLocation:
          type: string
        destination:
          type: string
        viaStops:
          type: ["string", "null"]
        journeyDate:
          type: string
        journeyTime:
          type: string
        returnRequired:
          type: boolean
        returnDate:
          type: ["string", "null"]
        returnTime:
          type: ["string", "null"]
        passengers:
          type: integer
        luggage:
          type: ["string", "null"]
        childSeatsRequired:
          type: boolean
        accessibilityRequirements:
          type: ["string", "null"]
        additionalNotes:
          type: ["string", "null"]
        fullName:
          type: string
        mobile:
          type: string
        email:
          type: string
        preferredContactMethod:
          type: string
        quotedPrice:
          type: ["string", "null"]
        adminNotes:
          type: ["string", "null"]
        assignedDriver:
          type: ["string", "null"]
        bookingReference:
          type: ["string", "null"]

    LeadUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [new, contacted, quoted, booked, completed, cancelled, archived]
        adminNotes:
          type: ["string", "null"]
        quotedPrice:
          type: ["string", "null"]
        assignedDriver:
          type: ["string", "null"]
        bookingReference:
          type: ["string", "null"]

    LeadListResponse:
      type: object
      required:
        - leads
        - total
        - page
        - limit
      properties:
        leads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    LeadReplyInput:
      type: object
      required:
        - subject
        - message
      properties:
        subject:
          type: string
        message:
          type: string
        quotedPrice:
          type: ["string", "null"]

    LeadReply:
      type: object
      required:
        - id
        - leadId
        - subject
        - message
        - sentAt
        - sentBy
      properties:
        id:
          type: integer
        leadId:
          type: integer
        subject:
          type: string
        message:
          type: string
        quotedPrice:
          type: ["string", "null"]
        sentAt:
          type: string
        sentBy:
          type: string

    AdminUser:
      type: object
      required:
        - id
        - email
        - name
        - role
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string

    AdminLoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string

    AdminStats:
      type: object
      required:
        - total
        - new
        - contacted
        - quoted
        - booked
        - completed
        - cancelled
        - archived
        - recentLeads
      properties:
        total:
          type: integer
        new:
          type: integer
        contacted:
          type: integer
        quoted:
          type: integer
        booked:
          type: integer
        completed:
          type: integer
        cancelled:
          type: integer
        archived:
          type: integer
        recentLeads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"

    CorporateApplicationInput:
      type: object
      required:
        - companyName
        - organisationType
        - companyAddress
        - city
        - postcode
        - contactName
        - email
        - phone
        - estimatedMonthlyJourneys
        - journeyTypes
        - preferredBilling
      properties:
        companyName:
          type: string
        organisationType:
          type: string
          enum: [business, school, council, nhs, charity, other]
        companyAddress:
          type: string
        city:
          type: string
        postcode:
          type: string
        website:
          type: ["string", "null"]
        contactName:
          type: string
        jobTitle:
          type: ["string", "null"]
        email:
          type: string
        phone:
          type: string
        estimatedMonthlyJourneys:
          type: string
        journeyTypes:
          type: string
        numberOfPassengers:
          type: ["string", "null"]
        preferredBilling:
          type: string
        contractStartDate:
          type: ["string", "null"]
        existingProviderDetails:
          type: ["string", "null"]
        additionalRequirements:
          type: ["string", "null"]

    CorporateApplication:
      type: object
      required:
        - id
        - createdAt
        - status
        - companyName
        - organisationType
        - companyAddress
        - city
        - postcode
        - contactName
        - email
        - phone
        - estimatedMonthlyJourneys
        - journeyTypes
        - preferredBilling
      properties:
        id:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        status:
          type: string
          enum: [new, reviewing, approved, rejected, on_hold]
        companyName:
          type: string
        organisationType:
          type: string
        companyAddress:
          type: string
        city:
          type: string
        postcode:
          type: string
        website:
          type: ["string", "null"]
        contactName:
          type: string
        jobTitle:
          type: ["string", "null"]
        email:
          type: string
        phone:
          type: string
        estimatedMonthlyJourneys:
          type: string
        journeyTypes:
          type: string
        numberOfPassengers:
          type: ["string", "null"]
        preferredBilling:
          type: string
        contractStartDate:
          type: ["string", "null"]
        existingProviderDetails:
          type: ["string", "null"]
        additionalRequirements:
          type: ["string", "null"]
        adminNotes:
          type: ["string", "null"]
        assignedTo:
          type: ["string", "null"]

    CorporateApplicationUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [new, reviewing, approved, rejected, on_hold]
        adminNotes:
          type: ["string", "null"]
        assignedTo:
          type: ["string", "null"]

    CorporateApplicationListResponse:
      type: object
      required:
        - applications
        - total
        - page
        - limit
      properties:
        applications:
          type: array
          items:
            $ref: "#/components/schemas/CorporateApplication"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Quote:
      type: object
      required:
        - id
        - quoteRef
        - leadId
        - status
        - customerName
        - customerEmail
        - customerMobile
        - pickupLocation
        - destination
        - journeyDate
        - journeyTime
        - returnRequired
        - passengers
        - journeyType
        - price
        - paymentCash
        - paymentCard
        - paymentBankTransfer
        - validUntil
        - createdAt
      properties:
        id:
          type: integer
        quoteRef:
          type: string
        leadId:
          type: integer
        status:
          type: string
          enum: [pending, accepted, paid, expired, cancelled]
        customerName:
          type: string
        customerEmail:
          type: string
        customerMobile:
          type: string
        pickupLocation:
          type: string
        destination:
          type: string
        viaStops:
          type: ["string", "null"]
        journeyDate:
          type: string
        journeyTime:
          type: string
        returnRequired:
          type: string
        returnDate:
          type: ["string", "null"]
        returnTime:
          type: ["string", "null"]
        passengers:
          type: integer
        journeyType:
          type: string
        price:
          type: string
        priceNotes:
          type: ["string", "null"]
        paymentCash:
          type: ["string", "null"]
        paymentCard:
          type: ["string", "null"]
        paymentBankTransfer:
          type: ["string", "null"]
        bankSortCode:
          type: ["string", "null"]
        bankAccountNumber:
          type: ["string", "null"]
        bankAccountName:
          type: ["string", "null"]
        validUntil:
          type: string
        adminMessage:
          type: ["string", "null"]
        acceptedAt:
          type: ["string", "null"]
        paidAt:
          type: ["string", "null"]
        squarePaymentLinkUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    CreateQuoteInput:
      type: object
      required:
        - price
        - validUntil
        - journeyType
        - pickupLocation
        - destination
        - journeyDate
        - journeyTime
        - passengers
        - customerName
        - customerEmail
        - customerMobile
        - returnRequired
      properties:
        price:
          type: string
        priceNotes:
          type: string
