kind = "web"
previewPath = "/"
title = "Lakeside & Purfleet Taxis"
version = "1.0.0"
id = "artifacts/lakeside-taxis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22561

[services.development]
run = "pnpm --filter @workspace/lakeside-taxis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lakeside-taxis", "run", "build" ]
publicDir = "artifacts/lakeside-taxis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22561"
BASE_PATH = "/"
